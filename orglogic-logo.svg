<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Back rotated square -->
  <rect x="62" y="62" width="76" height="76" rx="16" ry="16" fill="#6D28D9" opacity="0.3" transform="rotate(45 100 100)"/>
  
  <!-- Middle rotated square -->
  <rect x="68" y="68" width="64" height="64" rx="14" ry="14" fill="url(#grad1)" opacity="0.5" transform="rotate(22.5 100 100)"/>
  
  <!-- Front square -->
  <rect x="68" y="68" width="64" height="64" rx="14" ry="14" fill="url(#grad2)" opacity="0.7"/>

  <!-- Cardinal node dots -->
  <circle cx="100" cy="52" r="7" fill="#7C3AED"/>
  <circle cx="148" cy="100" r="7" fill="#8B5CF6"/>
  <circle cx="100" cy="148" r="7" fill="#7C3AED"/>
  <circle cx="52" cy="100" r="7" fill="#8B5CF6"/>
  
  <!-- Central intelligence node -->
  <circle cx="100" cy="100" r="10" fill="#7C3AED"/>
  <circle cx="100" cy="100" r="5" fill="#ffffff"/>
  
  <!-- Connecting lines -->
  <line x1="100" y1="59" x2="100" y2="90" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
  <line x1="141" y1="100" x2="110" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="141" x2="100" y2="110" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
  <line x1="59" y1="100" x2="90" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
</svg>
